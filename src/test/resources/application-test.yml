spring:
  datasource:
    url: jdbc:h2:mem:saira-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      auto-offset-reset: earliest
  cache:
    type: none
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - chat.giga.springai.autoconfigure.GigaChatAutoConfiguration
      - org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration
      - ai.qa.solutions.config.RagasMetricsAutoconfiguration
      - ai.qa.solutions.config.MultiProviderAutoConfiguration
      - ai.qa.solutions.config.MultiModelExecutorAutoconfiguration

saira:
  kafka:
    topic: fp-saira-spans
  ingest:
    url-patterns:
      - /completions
      - /embeddings
      - /mcp
  shadow:
    enabled: false

logging:
  level:
    root: WARN
    io.saira: INFO
